name: Download musl toolchain

inputs:
  arch:
    description: 'Architecture'
    required: true
    type: string

runs:
  using: "composite"
  steps:
  - name: Cache musl
    id: cache-musl
    uses: actions/cache/restore@v4
    with:
      path: ${{ inputs.arch }}-linux-musl-cross
      key: ${{ inputs.arch }}-linux-musl-cross
  - name: Download musl toolchain
    if: ${{ steps.cache-musl.outputs.cache-hit != 'true' && inputs.arch != 'loongarch64' }}
    shell: bash
    run: |
      set -euo pipefail
      MUSL_PATH=${{ inputs.arch }}-linux-musl-cross
      # musl.cc is intermittently unreachable from GitHub-hosted runners (connect timeout).
      # Optional: set repo Actions variable MUSL_CC_URL_OVERRIDE to a full URL of the same
      # .tgz layout as musl.cc (…/${MUSL_PATH}.tgz).
      if [ -n "${MUSL_CC_URL_OVERRIDE:-}" ]; then
        URLS=("${MUSL_CC_URL_OVERRIDE}")
      else
        URLS=(
          "https://musl.cc/${MUSL_PATH}.tgz"
          "http://musl.cc/${MUSL_PATH}.tgz"
        )
      fi
      ok=0
      for url in "${URLS[@]}"; do
        echo "Downloading musl toolchain from: ${url}"
        rm -f "${MUSL_PATH}.tgz"
        # Short timeouts: fail fast per URL; avoid multi-minute curl --retry storms.
        if curl -fSL --ipv4 --connect-timeout 30 --max-time 600 --retry 2 --retry-delay 5 \
            "$url" -o "${MUSL_PATH}.tgz"; then
          ok=1
          break
        fi
      done
      if [ "$ok" -ne 1 ]; then
        echo "::error::Could not download ${MUSL_PATH}.tgz from any configured URL. musl.cc may be down or blocked from GitHub. Add an Actions repository variable MUSL_CC_URL_OVERRIDE pointing to a mirror of the same tarball."
        exit 1
      fi
      tar -xf "${MUSL_PATH}.tgz"
  - name: Download musl toolchain
    if: ${{ steps.cache-musl.outputs.cache-hit != 'true' && inputs.arch == 'loongarch64' }}
    shell: bash
    run: |
      set -euo pipefail
      URL="https://github.com/LoongsonLab/oscomp-toolchains-for-oskernel/releases/download/loongarch64-linux-musl-cross-gcc-13.2.0/loongarch64-linux-musl-cross.tgz"
      curl -fSL --ipv4 --connect-timeout 30 --max-time 600 --retry 2 --retry-delay 5 \
        "$URL" -o loongarch64-linux-musl-cross.tgz
      tar -xf loongarch64-linux-musl-cross.tgz
  - uses: actions/cache/save@v4
    if: steps.cache-musl.outputs.cache-hit != 'true'
    with:
      path: ${{ inputs.arch }}-linux-musl-cross
      key: ${{ inputs.arch }}-linux-musl-cross

  - name: Add to PATH environment variable
    shell: bash
    run: |
      echo "$PWD/${{ inputs.arch }}-linux-musl-cross/bin" >> $GITHUB_PATH
  - name: Verify installation
    shell: bash
    run: |
      ${{ inputs.arch }}-linux-musl-gcc --version
